<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="RentACarMole mascot">
  <g id="mole-base" fill="white" stroke="#1e2d3d" stroke-linecap="round" stroke-linejoin="round">
    <!-- Crown puffs -->
    <circle cx="91" cy="28" r="5" stroke-width="2.5"/>
    <circle cx="100" cy="22" r="6" stroke-width="2.5"/>
    <circle cx="109" cy="28" r="5" stroke-width="2.5"/>
    <!-- Head -->
    <circle cx="100" cy="83" r="57" stroke-width="3.5"/>
    <!-- Left lens -->
    <circle cx="81" cy="89" r="19" stroke-width="4"/>
    <!-- Right lens -->
    <circle cx="119" cy="89" r="19" stroke-width="4"/>
    <!-- Bridge -->
    <line x1="100" y1="87" x2="100" y2="92" stroke-width="3"/>
    <!-- Temple arms -->
    <line x1="62" y1="89" x2="55" y2="89" stroke-width="3"/>
    <line x1="138" y1="89" x2="145" y2="89" stroke-width="3"/>
    <!-- Left pupil -->
    <circle cx="81" cy="89" r="9" fill="#1e2d3d" stroke="none"/>
    <circle cx="84" cy="86" r="3.5" fill="white" stroke="none"/>
    <!-- Right pupil -->
    <circle cx="119" cy="89" r="9" fill="#1e2d3d" stroke="none"/>
    <circle cx="122" cy="86" r="3.5" fill="white" stroke="none"/>
    <!-- Nose -->
    <ellipse cx="100" cy="113" rx="6" ry="4.5" fill="#1e2d3d" stroke="none"/>
    <!-- Car roof acting as the ledge -->
    <rect x="18" y="128" width="164" height="16" rx="6" stroke-width="3.5"/>
    <!-- Left paw on roof -->
    <ellipse cx="62" cy="128" rx="20" ry="11" stroke-width="3"/>
    <path d="M49,124 Q55,118 62,121 Q69,118 75,124" fill="none" stroke-width="2"/>
    <!-- Right paw on roof -->
    <ellipse cx="138" cy="128" rx="20" ry="11" stroke-width="3"/>
    <path d="M125,124 Q131,118 138,121 Q145,118 151,124" fill="none" stroke-width="2"/>
  </g>

  <g id="prop" fill="white" stroke="#1e2d3d" stroke-linecap="round" stroke-linejoin="round">
    <!-- Car body below roof -->
    <!-- Windows row -->
    <rect x="28" y="144" width="62" height="28" rx="4" stroke-width="2"/>
    <rect x="110" y="144" width="62" height="28" rx="4" stroke-width="2"/>
    <!-- Window divider (B-pillar) -->
    <rect x="92" y="144" width="16" height="28" fill="#1e2d3d" stroke="none" rx="2"/>
    <!-- Car lower body / door panel -->
    <rect x="18" y="170" width="164" height="20" rx="4" stroke-width="2.5"/>
    <!-- Door handle left -->
    <line x1="52" y1="178" x2="66" y2="178" stroke-width="2"/>
    <!-- Door handle right -->
    <line x1="134" y1="178" x2="148" y2="178" stroke-width="2"/>
    <!-- Left wheel arch -->
    <path d="M18,188 Q18,196 30,196 L55,196 Q68,196 68,188" stroke-width="2.5" fill="none"/>
    <!-- Right wheel arch -->
    <path d="M132,188 Q132,196 144,196 L169,196 Q182,196 182,188" stroke-width="2.5" fill="none"/>
    <!-- Left wheel -->
    <circle cx="43" cy="198" r="12" stroke-width="2.5"/>
    <circle cx="43" cy="198" r="5" fill="#1e2d3d" stroke="none"/>
    <!-- Right wheel -->
    <circle cx="157" cy="198" r="12" stroke-width="2.5"/>
    <circle cx="157" cy="198" r="5" fill="#1e2d3d" stroke="none"/>
    <!-- Headlight -->
    <ellipse cx="24" cy="175" rx="4" ry="3" fill="#fef9c3" stroke-width="1.5"/>
    <!-- Tail light -->
    <ellipse cx="176" cy="175" rx="4" ry="3" fill="#fee2e2" stroke-width="1.5"/>
  </g>
</svg>
