<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" role="img" aria-label="BurrowSoft">
  <!-- Mole head icon -->
  <circle cx="20" cy="20" r="18" fill="#f43f5e"/>
  <circle cx="20" cy="17" r="11" fill="white" stroke="#1e2d3d" stroke-width="1.5"/>
  <!-- Glasses -->
  <circle cx="15.5" cy="15.5" r="4.5" fill="white" stroke="#1e2d3d" stroke-width="1.5"/>
  <circle cx="24.5" cy="15.5" r="4.5" fill="white" stroke="#1e2d3d" stroke-width="1.5"/>
  <line x1="20" y1="15" x2="20" y2="16.5" stroke="#1e2d3d" stroke-width="1.2"/>
  <!-- Pupils -->
  <circle cx="15.5" cy="15.5" r="2" fill="#1e2d3d"/>
  <circle cx="16.2" cy="14.8" r="0.8" fill="white"/>
  <circle cx="24.5" cy="15.5" r="2" fill="#1e2d3d"/>
  <circle cx="25.2" cy="14.8" r="0.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="20" cy="22" rx="1.5" ry="1.2" fill="#1e2d3d"/>
  <!-- Ledge / paws -->
  <rect x="4" y="27" width="32" height="4" rx="2" fill="#1e2d3d"/>

  <!-- Wordmark -->
  <text x="46" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e2d3d" letter-spacing="-0.3">BurrowSoft</text>
</svg>
